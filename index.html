    <div className="w-full min-h-full bg-gradient-to-b from-sky-100 to-emerald-100 p-2 sm:p-4" style={{ fontFamily: "system-ui, sans-serif" }}>
      <style>{`@keyframes hh-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}`}</style>
      <div className="max-w-[680px] mx-auto">
        <div className="flex items-center justify-between mb-2">
          <h1 className="text-lg font-extrabold text-stone-800">🏰 Hearthhold</h1>
          <div className="flex items-center gap-2">
            <span className="text-xs text-stone-600 bg-white/70 rounded-lg px-2 py-1 flex items-center gap-1"><MousePointer2 size={12} />선택 {selectedIds.size}</span>
            <button onClick={reset} className="flex items-center gap-1 text-xs text-stone-600 bg-white/70 rounded-lg px-2 py-1 hover:bg-white"><RotateCcw size={13} />새로</button>
          </div>
        </div>
        <div className="mb-2"><ResourceBarM resources={resources} cap={cap} /></div>
        <div className="flex flex-wrap items-center gap-2 mb-2">
          <span className="flex items-center gap-1 bg-white/85 rounded-lg px-2 py-1 text-xs shadow-sm">✨<span className="text-stone-500">매력</span><span className="font-bold text-stone-800">{charm}</span></span>
          <span className="flex items-center gap-1 bg-white/85 rounded-lg px-2 py-1 text-xs shadow-sm">👷<span className="text-stone-500">일꾼</span><span className="font-bold text-stone-800">{workers.length}/{workerCap}</span></span>
          <button onClick={upgradeKeep} className="ml-auto flex items-center gap-1 text-xs font-semibold text-white bg-amber-600 hover:bg-amber-700 rounded-lg px-2.5 py-1.5 shadow-sm">
            <ChevronUp size={14} /> 본진 Lv.{keepLevel}{nextCost ? ` →${keepLevel + 1}` : " (MAX)"}
            {nextCost && <span className="font-normal opacity-90 ml-1">{RES_ORDER.filter(k => nextCost[k]).map(k => `${RES[k].icon}${nextCost[k]}`).join(" ")}</span>}
          </button>
        </div>
        <div ref={boardRef} onPointerDown={onBoardPointerDown} onPointerMove={onBoardMove} onPointerLeave={() => setHover(null)} onContextMenu={onContextMenu}
          className="relative w-full rounded-2xl overflow-hidden shadow-lg ring-1 ring-black/10 touch-none select-none"
          style={{ aspectRatio: `${COLS} / ${ROWS}`, background: "#84c06d", cursor: (mode === "build" && selected) || mode === "remove" ? "crosshair" : "default" }}>
          <Board placed={placed} siteCells={siteCells} keepLevel={keepLevel} selBuild={selected} mode={mode} hover={hover} canPlace={canPlace} fT={fT} fP={fP} />
          <div className="absolute inset-0" style={{ pointerEvents: "none" }}>
            {sitesView.map(s => (
              <div key={s.id} style={{ position: "absolute", left: `${(s.x / COLS) * 100}%`, top: `${(s.y / ROWS) * 100}%`, transform: "translate(-50%,-50%)", width: `${100 / COLS}%`, textAlign: "center" }}>
                <span style={{ fontSize: fP, opacity: 0.55, filter: "grayscale(0.4)" }}>{s.icon}</span>
                <div style={{ height: 3, background: "rgba(0,0,0,0.25)", borderRadius: 3, margin: "1px 15% 0" }}><div style={{ height: "100%", width: `${Math.min(100, s.progress * 100)}%`, background: s.worker ? "#34d399" : "#fbbf24", borderRadius: 3 }} /></div>
              </div>
            ))}
            {workers.map(w => {
              const sel = selectedIds.has(w.id);
              return (
                <div key={w.id} style={{ position: "absolute", left: `${(w.x / COLS) * 100}%`, top: `${(w.y / ROWS) * 100}%`, transform: "translate(-50%,-62%)", fontSize: fW, lineHeight: 1 }}>
                  {sel && <div style={{ position: "absolute", left: "50%", top: "82%", transform: "translate(-50%,-50%)", width: fW * 1.15, height: fW * 0.55, border: "2px solid #16a34a", borderRadius: "50%", boxShadow: "0 0 4px #16a34a" }} />}
                  <span style={{ display: "inline-block", position: "relative", animation: (w.state === "mining" || w.state === "building") ? "hh-bob 0.5s ease-in-out infinite" : "none" }}>👷</span>
                  {w.state === "building" && <span style={{ position: "absolute", top: -fW * 0.5, left: "55%", fontSize: fW * 0.55 }}>🔨</span>}
                  {w.carry && <span style={{ position: "absolute", top: -fW * 0.55, left: "50%", transform: "translateX(-50%)", fontSize: fW * 0.55 }}>{RES[w.carry.type].icon}</span>}
                </div>
              );
            })}
            {dragBox && <div style={{ position: "absolute", left: `${Math.min(dragBox.x0, dragBox.x1) / COLS * 100}%`, top: `${Math.min(dragBox.y0, dragBox.y1) / ROWS * 100}%`, width: `${Math.abs(dragBox.x1 - dragBox.x0) / COLS * 100}%`, height: `${Math.abs(dragBox.y1 - dragBox.y0) / ROWS * 100}%`, border: "2px solid #16a34a", background: "rgba(34,197,94,0.15)" }} />}
          </div>
        </div>
        {msg && <div className="mt-2 text-xs text-stone-700 bg-white/85 rounded-lg px-3 py-2 shadow-sm leading-relaxed">{msg}</div>}
        {selWorker && <div className="mt-3"><WorkerSheet w={selWorker} resources={resources} onSkill={(cat) => allocSkill(selWorker.id, cat)} onEquip={(s, t) => upgradeEquip(selWorker.id, s, t)} /></div>}
        <div className="mt-3 bg-white/70 rounded-2xl p-3 shadow-sm">
          <Panel tab={tab} setTab={setTab} mode={mode} setMode={setMode} selected={selected} setSelected={setSelected} resources={resources} costFor={costFor} counts={counts} workerCap={workerCap} />
        </div>
        <div className="mt-2 text-[10px] text-stone-500 leading-relaxed px-1">
          클릭=선택 · 드래그=범위선택 · 우클릭/길게=명령 · 한 명 선택 시 능력치·장비 창 · A=전체 · 숫자=그룹 / Shift+숫자=지정 · Esc=취소 · 건물 H D L M F
        </div>
        <button onClick={() => toast("전투 페이지는 다음 버전에서 만들 예정이에요! ⚔️🏰")}
          className="mt-3 w-full flex items-center justify-center gap-2 text-sm font-semibold text-stone-500 bg-stone-200/70 rounded-xl py-2.5 hover:bg-stone-200">
          <Lock size={15} /> 전투 출정 <span className="text-xs font-normal">(다음 업데이트 예정)</span> <Swords size={15} />
        </button>
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
